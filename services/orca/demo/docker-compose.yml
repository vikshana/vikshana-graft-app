# Orca Demo — Standalone OTel Demo subset
#
# This file defines the minimal set of OpenTelemetry Demo services needed to
# showcase Orca. It is fully standalone — it does NOT layer on top of the
# submodule's docker-compose.yml.
#
# Usage (from repo root, via the Makefile):
#   make up          # starts Orca stack + this demo subset
#   make demo-only   # starts only this demo subset (no Orca)
#
# DO NOT run this file directly. Use the Makefile which combines this with
# the root docker-compose.yml and loads the correct .env files.
#
# Prerequisites:
#   git submodule update --init --recursive
#   cp .env.example .env && edit .env  (set ANTHROPIC_API_KEY)
#
# Service topology:
#
#   Fault-injection targets:  ad, cart, product-catalog
#   Feature flags:            flagd, flagd-ui
#   Traffic generation:       load-generator, frontend-proxy, frontend, image-provider
#   Telemetry pipeline:       otel-collector → prometheus (metrics), loki (logs)
#   Alerting:                 grafana → webhook → orca-backend
#   Service dependencies:     valkey-cart (cart), postgresql (product-catalog)

x-default-logging: &logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"
    tag: "{{.Name}}"

services:
  # ===========================================================================
  # Orca overrides — when running in demo mode, orca-backend needs to reach
  # Grafana via Docker networking (not localhost).
  # ===========================================================================
  orca-backend:
    environment:
      GRAFANA_URL: http://grafana:3000
      # Point the investigate node at the persistent SSE sidecar instead of
      # spawning a subprocess per RCA.  See grafana_client.py for fallback logic.
      GRAFANA_MCP_URL: http://grafana-mcp:8000/sse
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-orca-demo}
    # Mount the shared volume so grafana_client.py can read the provisioned token
    volumes:
      - grafana-api-key:/run/orca
    depends_on:
      grafana-provisioner:
        condition: service_completed_successfully
      grafana-mcp:
        condition: service_started

  # ===========================================================================
  # Feature Flags — fault injection control plane
  # ===========================================================================
  flagd:
    image: ${FLAGD_IMAGE:-ghcr.io/open-feature/flagd:v0.13.3}
    container_name: flagd
    deploy:
      resources:
        limits:
          memory: 75M
    restart: unless-stopped
    # -------------------------------------------------------------------------
    # Flag-change workflow for the demo:
    #
    #   1. Change flag values in the flagd-ui (http://localhost:8080/feature) or
    #      by editing demo/opentelemetry-demo/src/flagd/demo.flagd.json directly.
    #
    #   2. Run: docker restart ad cart product-catalog
    #
    #   WHY: The OpenFeature SDKs in the demo services use in-process evaluation —
    #   they cache all flag values at startup via the gRPC EventStream and then
    #   evaluate entirely in-process (no per-request gRPC calls).  Flag updates
    #   propagate via EventStream push notifications.  In flagd v0.13.3 the v1
    #   EventStream handler has a proto serialisation bug
    #   (proto:invalid type: notifications.Notifications) that silently drops
    #   change notifications.  Services therefore never see the updated values
    #   until they reconnect (i.e. restart).
    #
    #   Alternatively restarting flagd itself forces all clients to reconnect
    #   and re-sync:  docker restart flagd
    # -------------------------------------------------------------------------
    environment:
      - FLAGD_OTEL_COLLECTOR_URI=otel-collector:${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - FLAGD_METRICS_EXPORTER=otel
      - GOMEMLIMIT=60MiB
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=flagd
    command:
      [
        "start",
        "--uri",
        "file:./etc/flagd/demo.flagd.json",
      ]
    ports:
      - "${FLAGD_PORT:-8013}"
      - "${FLAGD_OFREP_PORT:-8016}"
    volumes:
      - ./demo/opentelemetry-demo/src/flagd:/etc/flagd
    logging: *logging

  flagd-ui:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-flagd-ui
    container_name: flagd-ui
    deploy:
      resources:
        limits:
          memory: 200M
    restart: always
    environment:
      - FLAGD_UI_PORT=${FLAGD_UI_PORT:-4000}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${OTEL_COLLECTOR_PORT_HTTP:-4318}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=flagd-ui
      - SECRET_KEY_BASE=yYrECL4qbNwleYInGJYvVnSkwJuSQJ4ijPTx5tirGUXrbznFIBFVJdPl5t6O9ASw
      - PHX_HOST=localhost
    ports:
      - "${FLAGD_UI_PORT:-4000}"
    depends_on:
      otel-collector:
        condition: service_started
      flagd:
        condition: service_started
    volumes:
      - ./demo/opentelemetry-demo/src/flagd:/app/data

  # ===========================================================================
  # Fault-injection target services (3 demo microservices)
  # ===========================================================================

  # Ad Service — Java; flags: adFailure, adHighCpu, adManualGc
  ad:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-ad
    container_name: ad
    deploy:
      resources:
        limits:
          memory: 300M
    restart: unless-stopped
    ports:
      - "${AD_PORT:-9555}"
    environment:
      - AD_PORT=${AD_PORT:-9555}
      - FLAGD_HOST=${FLAGD_HOST:-flagd}
      - FLAGD_PORT=${FLAGD_PORT:-8013}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${OTEL_COLLECTOR_PORT_HTTP:-4318}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_SERVICE_NAME=ad
    depends_on:
      otel-collector:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  # Cart Service — .NET; flags: cartFailure, failedReadinessProbe
  cart:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-cart
    container_name: cart
    deploy:
      resources:
        limits:
          memory: 160M
    restart: unless-stopped
    ports:
      - "${CART_PORT:-7070}"
    environment:
      - CART_PORT=${CART_PORT:-7070}
      - FLAGD_HOST=${FLAGD_HOST:-flagd}
      - FLAGD_PORT=${FLAGD_PORT:-8013}
      - VALKEY_ADDR=${VALKEY_ADDR:-valkey-cart:6379}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=cart
      - ASPNETCORE_URLS=http://*:${CART_PORT:-7070}
    depends_on:
      valkey-cart:
        condition: service_started
      otel-collector:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  # Product Catalog Service — Go; flag: productCatalogFailure
  product-catalog:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-product-catalog
    container_name: product-catalog
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${PRODUCT_CATALOG_PORT:-3550}"
    environment:
      - PRODUCT_CATALOG_PORT=${PRODUCT_CATALOG_PORT:-3550}
      - FLAGD_HOST=${FLAGD_HOST:-flagd}
      - FLAGD_PORT=${FLAGD_PORT:-8013}
      - GOMEMLIMIT=16MiB
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=product-catalog
      - OTEL_CONFIG_FILE=/otel-config.yml
      - OTEL_SEMCONV_STABILITY_OPT_IN=database
      - DB_CONNECTION_STRING=postgres://otelu:otelp@postgresql/${POSTGRES_DB:-otel}?sslmode=disable
    depends_on:
      otel-collector:
        condition: service_started
      flagd:
        condition: service_started
      postgresql:
        condition: service_started
    volumes:
      - ./demo/opentelemetry-demo/otel-config.yml:/otel-config.yml
    logging: *logging

  # ===========================================================================
  # Service dependencies (backing stores for demo services)
  # ===========================================================================
  valkey-cart:
    image: ${VALKEY_IMAGE:-valkey/valkey:9.0.2-alpine3.23}
    container_name: valkey-cart
    user: valkey
    deploy:
      resources:
        limits:
          memory: 20M
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT:-6379}"
    logging: *logging

  postgresql:
    image: ${POSTGRES_IMAGE:-postgres:17.8}
    container_name: demo-postgresql
    deploy:
      resources:
        limits:
          memory: 80M
    restart: unless-stopped
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otel}
      - POSTGRES_DB=${POSTGRES_DB:-otel}
    volumes:
      - ./demo/opentelemetry-demo/src/postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    logging: *logging

  # ===========================================================================
  # Traffic generation — load-generator + frontend stack
  # ===========================================================================
  frontend:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-frontend
    container_name: demo-frontend
    deploy:
      resources:
        limits:
          memory: 250M
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}"
    environment:
      - PORT=${FRONTEND_PORT:-8080}
      - FRONTEND_ADDR=${FRONTEND_ADDR:-frontend:8080}
      - AD_ADDR=${AD_ADDR:-ad:9555}
      - CART_ADDR=${CART_ADDR:-cart:7070}
      - CHECKOUT_ADDR=${CHECKOUT_ADDR:-checkout:5050}
      - CURRENCY_ADDR=${CURRENCY_ADDR:-currency:7001}
      - PRODUCT_CATALOG_ADDR=${PRODUCT_CATALOG_ADDR:-product-catalog:3550}
      - PRODUCT_REVIEWS_ADDR=${PRODUCT_REVIEWS_ADDR:-product-reviews:3551}
      - RECOMMENDATION_ADDR=${RECOMMENDATION_ADDR:-recommendation:9001}
      - SHIPPING_ADDR=${SHIPPING_ADDR:-shipping:50050}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_RESOURCE_ATTRIBUTES
      - ENV_PLATFORM=${ENV_PLATFORM:-local}
      - OTEL_SERVICE_NAME=frontend
      - PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - WEB_OTEL_SERVICE_NAME=frontend-web
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-otel-collector}
      - FLAGD_HOST=${FLAGD_HOST:-flagd}
      - FLAGD_PORT=${FLAGD_PORT:-8013}
    depends_on:
      ad:
        condition: service_started
      cart:
        condition: service_started
      product-catalog:
        condition: service_started
      otel-collector:
        condition: service_started
      image-provider:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  frontend-proxy:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-frontend-proxy
    container_name: frontend-proxy
    deploy:
      resources:
        limits:
          memory: 65M
    restart: unless-stopped
    ports:
      - "${ENVOY_PORT:-8080}:${ENVOY_PORT:-8080}"
      - "${ENVOY_ADMIN_PORT:-10000}:${ENVOY_ADMIN_PORT:-10000}"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT:-8080}
      - FRONTEND_HOST=${FRONTEND_HOST:-frontend}
      - LOCUST_WEB_HOST=${LOCUST_WEB_HOST:-load-generator}
      - LOCUST_WEB_PORT=${LOCUST_WEB_PORT:-8089}
      - GRAFANA_PORT=${GRAFANA_PORT:-3000}
      - GRAFANA_HOST=${GRAFANA_HOST:-grafana}
      - JAEGER_UI_PORT=${JAEGER_UI_PORT:-16686}
      - JAEGER_HOST=${JAEGER_HOST:-jaeger}
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-otel-collector}
      - IMAGE_PROVIDER_HOST=${IMAGE_PROVIDER_HOST:-image-provider}
      - IMAGE_PROVIDER_PORT=${IMAGE_PROVIDER_PORT:-8081}
      - OTEL_COLLECTOR_PORT_GRPC=${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_COLLECTOR_PORT_HTTP=${OTEL_COLLECTOR_PORT_HTTP:-4318}
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=frontend-proxy
      - ENVOY_PORT=${ENVOY_PORT:-8080}
      - ENVOY_ADDR=${ENVOY_ADDR:-0.0.0.0}
      - ENVOY_ADMIN_PORT=${ENVOY_ADMIN_PORT:-10000}
      - FLAGD_HOST=${FLAGD_HOST:-flagd}
      - FLAGD_PORT=${FLAGD_PORT:-8013}
      - FLAGD_UI_HOST=${FLAGD_UI_HOST:-flagd-ui}
      - FLAGD_UI_PORT=${FLAGD_UI_PORT:-4000}
    depends_on:
      frontend:
        condition: service_started
      load-generator:
        condition: service_started
      grafana:
        condition: service_started
      flagd-ui:
        condition: service_started
    dns_search: ""

  image-provider:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-image-provider
    container_name: image-provider
    deploy:
      resources:
        limits:
          memory: 120M
    restart: unless-stopped
    ports:
      - "${IMAGE_PROVIDER_PORT:-8081}"
    environment:
      - IMAGE_PROVIDER_PORT=${IMAGE_PROVIDER_PORT:-8081}
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-otel-collector}
      - OTEL_COLLECTOR_PORT_GRPC=${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=image-provider
    depends_on:
      otel-collector:
        condition: service_started
    logging: *logging

  load-generator:
    image: ${IMAGE_NAME:-ghcr.io/open-telemetry/demo}:${DEMO_VERSION:-latest}-load-generator
    container_name: load-generator
    deploy:
      resources:
        limits:
          memory: 1500M
    restart: unless-stopped
    ports:
      - "${LOCUST_WEB_PORT:-8089}"
    environment:
      - LOCUST_WEB_PORT=${LOCUST_WEB_PORT:-8089}
      - LOCUST_USERS=${LOCUST_USERS:-15}
      - LOCUST_SPAWN_RATE=${LOCUST_SPAWN_RATE:-15}
      - LOCUST_HOST=http://${FRONTEND_PROXY_ADDR:-frontend-proxy:8080}
      - LOCUST_HEADLESS=${LOCUST_HEADLESS:-false}
      - LOCUST_AUTOSTART=${LOCUST_AUTOSTART:-true}
      - LOCUST_BROWSER_TRAFFIC_ENABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
      - OTEL_RESOURCE_ATTRIBUTES
      - OTEL_SERVICE_NAME=load-generator
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
      - LOCUST_WEB_HOST=0.0.0.0
      - FLAGD_HOST=${FLAGD_HOST:-flagd}
      - FLAGD_PORT=${FLAGD_PORT:-8013}
      - FLAGD_OFREP_PORT=${FLAGD_OFREP_PORT:-8016}
    depends_on:
      frontend:
        condition: service_started
      flagd:
        condition: service_started
    logging: *logging

  # ===========================================================================
  # Telemetry pipeline
  # ===========================================================================
  otel-collector:
    image: ${COLLECTOR_CONTRIB_IMAGE:-ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.146.1}
    container_name: otel-collector
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config.yml"]
    volumes:
      - ./demo/otel-collector-config.yml:/etc/otelcol-config.yml
    ports:
      - "${OTEL_COLLECTOR_PORT_GRPC:-4317}"
      - "${OTEL_COLLECTOR_PORT_HTTP:-4318}"
    environment:
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-otel-collector}
      - OTEL_COLLECTOR_PORT_GRPC=${OTEL_COLLECTOR_PORT_GRPC:-4317}
      - OTEL_COLLECTOR_PORT_HTTP=${OTEL_COLLECTOR_PORT_HTTP:-4318}
      - GOMEMLIMIT=160MiB
    logging: *logging

  prometheus:
    image: ${PROMETHEUS_IMAGE:-quay.io/prometheus/prometheus:v3.9.1}
    container_name: prometheus
    command:
      - --web.console.templates=/etc/prometheus/consoles
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --storage.tsdb.retention.time=7d
      - --config.file=/etc/prometheus/prometheus-config.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.route-prefix=/
      - --web.enable-otlp-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./demo/opentelemetry-demo/src/prometheus/prometheus-config.yaml:/etc/prometheus/prometheus-config.yaml
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    logging: *logging

  loki:
    image: grafana/loki:3.4.3
    container_name: loki
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    logging: *logging

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.3.3}
    container_name: grafana
    deploy:
      resources:
        limits:
          memory: 175M
    restart: unless-stopped
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=ngalert
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      # Disable background plugin auto-update.  In Grafana 12 the
      # plugin.backgroundinstaller and provisioning modules start within
      # milliseconds of each other.  When the installer re-installs/updates
      # grafana-lokiexplore-app or grafana-metricsdrilldown-app it briefly
      # deregisters the old plugin, making the 'loki' / 'prometheus' datasource
      # type unavailable.  The provisioner catches the resulting "data source not
      # found" error as a fatal failure (not the expected ErrDataSourceNotFound
      # sentinel), crashing Grafana into a restart loop that lasts ~2 minutes.
      # Disabling auto-update keeps installed plugins stable at startup.
      - GF_PLUGINS_PREINSTALL_AUTO_UPDATE=false
      # No-auth / anonymous access for demo
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      # Persist Grafana's SQLite database so service account tokens survive restarts
      - grafana-data:/var/lib/grafana
      - ./demo/grafana-provisioning/alerting/alert-rules.yml:/etc/grafana/provisioning/alerting/alert-rules.yml
      - ./demo/grafana-provisioning/contact-points/orca-webhook.yml:/etc/grafana/provisioning/alerting/orca-webhook.yml
      - ./demo/grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./demo/opentelemetry-demo/src/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    logging: *logging

  # ---------------------------------------------------------------------------
  # Grafana provisioner — one-shot container that creates the 'orca-mcp'
  # service account and issues a fresh API token after Grafana is healthy.
  # The token is written to a shared Docker volume so orca-backend picks it
  # up automatically without needing GRAFANA_API_KEY set in .env.
  #
  # Token is rotated on every 'make up' (--force-recreate recreates this
  # container).  Retrieve the value any time with: make grafana-key
  # ---------------------------------------------------------------------------
  grafana-provisioner:
    image: python:3.12-slim
    container_name: grafana-provisioner
    restart: "no"
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY_FILE=/run/orca/GRAFANA_API_KEY
    volumes:
      - ./demo/grafana-provisioning/scripts/provision.py:/scripts/provision.py:ro
      - grafana-api-key:/run/orca
    command: python3 /scripts/provision.py
    depends_on:
      grafana:
        condition: service_healthy
    logging: *logging

  # ---------------------------------------------------------------------------
  # Grafana MCP sidecar — persistent SSE server exposing Grafana tooling to
  # the Orca investigate node.
  #
  # Why a persistent sidecar instead of per-RCA subprocesses?
  #   • Zero startup latency per investigation (no npx/binary cold-start)
  #   • Tool scope enforced at the server level via -enabled-tools (read-only
  #     search, datasource, prometheus, loki, alerting, dashboard tools only)
  #   • Single process — easy to monitor and restart
  #
  # For finer per-RCA permissions in production:
  #   Run multiple instances with different -enabled-tools or GRAFANA_API_KEY
  #   values and route each RCA to the appropriate instance based on alert
  #   labels (e.g. severity, team) by overriding GRAFANA_MCP_URL per agent run.
  # ---------------------------------------------------------------------------
  grafana-mcp:
    build:
      context: .
      dockerfile: demo/Dockerfile.grafana-mcp
    container_name: grafana-mcp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    environment:
      - GRAFANA_URL=http://grafana:3000
      # GRAFANA_API_KEY is read from the shared volume by the entrypoint script
    volumes:
      - grafana-api-key:/run/orca
    depends_on:
      grafana-provisioner:
        condition: service_completed_successfully
    logging: *logging
#   grafana-data      Persists Grafana's SQLite database across restarts so
#                     service account tokens are not lost on 'make down/up'.
#   grafana-api-key   Shared volume between grafana-provisioner and orca-backend
#                     carrying the current API token at /run/orca/GRAFANA_API_KEY.
# Both volumes are removed by 'make clean' (docker compose down -v).
# ---------------------------------------------------------------------------
volumes:
  grafana-data:
  grafana-api-key:
