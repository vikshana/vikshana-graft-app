apiVersion: 1

# ============================================================================
# Orca Demo — Grafana Alert Rules
# ============================================================================
#
# ALL alerts use OTel-native metrics (OTLP push → Prometheus).
# Prometheus does NOT scrape the demo services, so the `up` metric is
# unavailable.  Never use `up{job="..."}` here.
#
# Label promotion (prometheus-config.yaml → promote_resource_attributes):
#   OTel resource attribute      Prometheus label
#   ─────────────────────────    ──────────────────────────────
#   service.name              →  service_name
#   service.namespace         →  service_namespace
#   deployment.environment    →  deployment_environment_name
#
# Primary metric sources
# ──────────────────────
# traces_span_metrics_calls_total
#   Generated by the OTel collector spanmetrics connector from distributed
#   traces.  Works identically for gRPC (ad, product-catalog) and HTTP
#   (cart, frontend) services — the only universal cross-language error signal.
#   Default dimensions: service_name, span_name, span_kind, status_code
#   status_code values: STATUS_CODE_UNSET | STATUS_CODE_OK | STATUS_CODE_ERROR
#
#   IMPORTANT: In this demo status_code is always STATUS_CODE_UNSET because
#   the auto-instrumentation does not set the OTel span Status field.  Instead,
#   the gRPC status code is recorded as the span attribute rpc.grpc.status_code
#   (integer: 0=OK, 9=FAILED_PRECONDITION, 13=INTERNAL, 14=UNAVAILABLE, …).
#   The collector config promotes this attribute as an extra spanmetrics
#   dimension (→ Prometheus label rpc_grpc_status_code).
#   Error-rate alerts filter on: rpc_grpc_status_code!="" (gRPC spans only)
#                            AND rpc_grpc_status_code!="0" (non-OK only)
#
# traces_spanmetrics_duration_milliseconds_{bucket,sum,count}
#   Duration histogram from the same spans.  Unit: milliseconds.
#
# http_server_request_duration_seconds_{bucket,sum,count}
#   OTel HTTP semantic-convention histogram from ASP.NET Core (cart service).
#   Used for service-down detection as it provides a steady heartbeat of traffic.
#
# jvm_cpu_time_seconds_total / jvm_cpu_count
#   OTel Java SDK runtime instrumentation (ad service).
#   jvm.cpu.time  (counter, s)  → jvm_cpu_time_seconds_total
#   jvm.cpu.count (gauge)       → jvm_cpu_count
#
# jvm_gc_duration_seconds_{bucket,sum,count}
#   OTel Java SDK: jvm.gc.duration histogram (s) — ad service JVM GC pauses.
#
# ============================================================================
# Feature flag → alert mapping
# ─────────────────────────────
#   adFailure             → AdServiceHighErrorRate        (alert 1)
#     Throws gRPC UNAVAILABLE on ~10% of GetAds requests.
#
#   adHighCpu             → AdServiceHighCpu              (alert 4)
#     Spawns 4 Logarithmizer threads; saturates JVM CPU.
#
#   adManualGc            → AdServiceJvmGcHighPause       (alert 5)
#     Fills heap to 90% then triggers 10× full stop-the-world GC every 10 s.
#     Also surfaces in ServiceHighLatency (alert 6).
#
#   cartFailure           → CartServiceHighErrorRate      (alert 2)
#     EmptyCart uses bad Valkey backend (badhost:1234);
#     raises gRPC FailedPrecondition on every checkout.
#
#   productCatalogFailure → ProductCatalogHighErrorRate   (alert 3)
#     GetProduct(OLJCESPC7Z) returns gRPC Internal error.
#     OLJCESPC7Z is 1-of-10 products in the load-generator list.
#
#   failedReadinessProbe  → (no Prometheus metric alert)
#     Makes gRPC health check report UNHEALTHY.  Observable via health-check
#     trace spans and Loki logs only.
# ============================================================================

groups:
  - orgId: 1
    name: OTel Demo — Service Health
    folder: Orca Demo
    interval: 1m
    rules:

      # ======================================================================
      # 1. Ad Service — High Error Rate
      #    Flag:      adFailure
      #    Mechanism: AdService.java throws StatusRuntimeException(UNAVAILABLE) on
      #               random.nextInt(10) == 0 inside getAds().
      #               The OTel Java gRPC auto-instrumentation records the gRPC status
      #               code as span attribute rpc.grpc.status_code (integer: 14=UNAVAILABLE).
      #               NOTE: status_code (OTel span Status) is always STATUS_CODE_UNSET
      #               in this demo — rpc.grpc.status_code is the reliable error signal.
      #               spanmetrics connector (with rpc.grpc.status_code dimension) increments:
      #                 traces_span_metrics_calls_total{service_name="ad",rpc_grpc_status_code="14"}
      #
      #    Query notes (verified against live Prometheus):
      #    - span_kind="SPAN_KIND_SERVER" is required on the numerator to exclude
      #      outbound CLIENT spans (e.g. flagd.evaluation calls) which also carry
      #      non-zero rpc_grpc_status_code values and would create false positives.
      #    - `or vector(0)` on the numerator prevents a "no data" result when the
      #      adFailure flag is off (no error spans exist), which would otherwise
      #      trigger noDataState: Alerting immediately on startup.
      #    - The denominator uses all SPAN_KIND_SERVER spans for the service so it
      #      remains non-zero while the service is healthy, giving a meaningful ratio.
      #    - noDataState: OK — if the service has no traffic yet (e.g. cold start)
      #      the denominator is empty and the query returns no data; treat as OK.
      # ======================================================================
      - uid: orca-ad-high-error-rate
        title: AdServiceHighErrorRate
        condition: error_rate_condition
        data:
          - refId: error_rate
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  sum(rate(traces_span_metrics_calls_total{
                    service_name="ad",
                    rpc_grpc_status_code!="",
                    rpc_grpc_status_code!="0",
                    span_kind="SPAN_KIND_SERVER"
                  }[5m])) or vector(0)
                )
                /
                sum(rate(traces_span_metrics_calls_total{
                  service_name="ad",
                  span_kind="SPAN_KIND_SERVER"
                }[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: error_rate_condition
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.05]   # 5% threshold; adFailure causes ~10% errors
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [error_rate]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: error_rate
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: High error rate on ad service
          description: |
            Ad service error rate is {{ $values.error_rate | humanizePercentage }},
            exceeding the 5% threshold for more than 2 minutes.

            Most likely cause: the **adFailure** feature flag is active.
            When enabled, AdService.getAds() throws gRPC UNAVAILABLE on ~10% of
            requests (random.nextInt(10) == 0 check inside the handler).

            Investigate:
            - Check flag state at http://localhost:4000 (flagd-ui)
            - Search Grafana traces for ad service spans with status=ERROR
            - Check ad service logs (Loki: {service_name="ad"}) for WARN "GetAds Failed"
            - Look at app_ads_ad_requests_total counter for request type breakdown
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          service_name: ad
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: advertising
          system_id: otel-demo-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 2. Cart Service — High Error Rate
      #    Flag:      cartFailure
      #    Mechanism: CartService.cs EmptyCart() is wired to a ValkeyCartStore
      #               pointing at "badhost:1234" when the flag is true.
      #               Connection fails → RpcException(FailedPrecondition) thrown.
      #               The OTel .NET gRPC instrumentation records rpc.grpc.status_code=9
      #               (FAILED_PRECONDITION) on the server span.
      #               NOTE: status_code (OTel span Status) is always STATUS_CODE_UNSET
      #               in this demo — rpc.grpc.status_code is the reliable error signal.
      #               spanmetrics connector (with rpc.grpc.status_code dimension) increments:
      #                 traces_span_metrics_calls_total{service_name="cart",rpc_grpc_status_code="9"}
      #    Scope:     Only EmptyCart is affected; AddItem and GetCart use the real store.
      #
      #    Query notes (verified against live Prometheus):
      #    - span_kind="SPAN_KIND_SERVER" is CRITICAL here. The .NET cart service
      #      makes outbound CLIENT calls to flagd (flagd.evaluation.v2.Service/*)
      #      which return rpc_grpc_status_code=12 (UNIMPLEMENTED). Without the
      #      SPAN_KIND_SERVER filter, those client error spans dominate the numerator
      #      and produce a ~93% false error rate even when cartFailure is off.
      #    - `or vector(0)` on the numerator prevents a "no data" result when there
      #      are no server-side gRPC errors, avoiding noDataState: Alerting.
      #    - The denominator uses all SPAN_KIND_SERVER spans (AddItem + GetCart +
      #      EmptyCart when active), giving a stable non-zero base rate.
      #    - noDataState: OK — if no server spans exist yet, treat as OK.
      # ======================================================================
      - uid: orca-cart-high-error-rate
        title: CartServiceHighErrorRate
        condition: error_rate_condition
        data:
          - refId: error_rate
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  sum(rate(traces_span_metrics_calls_total{
                    service_name="cart",
                    rpc_grpc_status_code!="",
                    rpc_grpc_status_code!="0",
                    span_kind="SPAN_KIND_SERVER"
                  }[5m])) or vector(0)
                )
                /
                sum(rate(traces_span_metrics_calls_total{
                  service_name="cart",
                  span_kind="SPAN_KIND_SERVER"
                }[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: error_rate_condition
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.05]   # 5% threshold
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [error_rate]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: error_rate
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: High error rate on cart service
          description: |
            Cart service error rate is {{ $values.error_rate | humanizePercentage }},
            exceeding the 5% threshold for more than 2 minutes.

            Most likely cause: the **cartFailure** feature flag is active.
            When enabled, EmptyCart() is routed to an invalid Valkey backend
            (badhost:1234), causing gRPC FailedPrecondition on every checkout
            flow that empties the cart.

            Investigate:
            - Check flag state at http://localhost:4000 (flagd-ui)
            - Search Grafana traces for cart service spans with status=ERROR,
              specifically the oteldemo.CartService/EmptyCart span
            - Check cart service logs (Loki: {service_name="cart"}) for
              "Can't access cart storage" errors with the bad host address
            - Query app_cart_add_item_latency_seconds for latency patterns
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          service_name: cart
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: cart
          system_id: otel-demo-001
          team: cart-team
          version: "1.0.0"

      # ======================================================================
      # 3. Product Catalog — High Error Rate
      #    Flag:      productCatalogFailure
      #    Mechanism: productCatalog.checkProductFailure() returns true for product
      #               OLJCESPC7Z when the flag is enabled.
      #               GetProduct() returns status.Errorf(codes.Internal, "...").
      #               The OTel Go gRPC auto-instrumentation records rpc.grpc.status_code=13
      #               (INTERNAL) on the server span.
      #               NOTE: status_code (OTel span Status) is always STATUS_CODE_UNSET
      #               in this demo — rpc.grpc.status_code is the reliable error signal.
      #               spanmetrics connector (with rpc.grpc.status_code dimension) increments:
      #                 traces_span_metrics_calls_total{service_name="product-catalog",rpc_grpc_status_code="13"}
      #    Traffic:   OLJCESPC7Z is 1-of-10 products in the load-generator product list
      #               (task weight 10 for browse_product) → ~10% of product browse calls
      #               fail, producing ~1%+ overall service error rate.
      #    Threshold: 1% (lower than others because only one specific product fails).
      #
      #    Query notes (verified against live Prometheus):
      #    - span_kind="SPAN_KIND_SERVER" scopes the query to the gRPC server span.
      #      In normal operation, GetProduct spans have no rpc_grpc_status_code label
      #      (the attribute only appears when the Go SDK sets a non-zero status on error).
      #    - `or vector(0)` prevents a "no data" result when flags are off and no error
      #      spans exist, avoiding a spurious noDataState: Alerting on startup.
      #    - The denominator counts ALL product-catalog server spans to give a stable base.
      #    - noDataState: OK — if the service has no traffic yet, treat as OK.
      # ======================================================================
      - uid: orca-productcatalog-high-error-rate
        title: ProductCatalogHighErrorRate
        condition: error_rate_condition
        data:
          - refId: error_rate
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                (
                  sum(rate(traces_span_metrics_calls_total{
                    service_name="product-catalog",
                    rpc_grpc_status_code!="",
                    rpc_grpc_status_code!="0",
                    span_kind="SPAN_KIND_SERVER"
                  }[5m])) or vector(0)
                )
                /
                sum(rate(traces_span_metrics_calls_total{
                  service_name="product-catalog",
                  span_kind="SPAN_KIND_SERVER"
                }[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: error_rate_condition
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.01]   # 1% threshold — only product OLJCESPC7Z fails
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [error_rate]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: error_rate
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: High error rate on product-catalog service
          description: |
            Product catalog error rate is {{ $values.error_rate | humanizePercentage }},
            exceeding the 1% threshold for more than 2 minutes.

            Most likely cause: the **productCatalogFailure** feature flag is active.
            When enabled, GetProduct for product ID OLJCESPC7Z returns a gRPC Internal
            error with message "Product Catalog Fail Feature Flag Enabled".
            OLJCESPC7Z ("Sunglasses") is one of 10 products the load-generator browses,
            so it generates a persistent ~10% browse error rate on that product.

            Investigate:
            - Check flag state at http://localhost:4000 (flagd-ui)
            - Search Grafana traces for product-catalog spans with status=ERROR
              and span attribute app.product.id="OLJCESPC7Z"
            - Check product-catalog logs (Loki: {service_name="product-catalog"})
              for "Product Catalog Fail Feature Flag Enabled"
            - Query the database: SELECT * FROM catalog.products WHERE id='OLJCESPC7Z'
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          service_name: product-catalog
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: catalog
          system_id: otel-demo-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 4. Ad Service — High JVM CPU Utilisation
      #    Flag:      adHighCpu
      #    Mechanism: CPULoad.execute(true) spawns THREAD_COUNT=4 daemon threads
      #               each running a Logarithmizer (continuous log() calculations),
      #               saturating available CPU cores.
      #    Metric:    OTel Java SDK runtime instrumentation:
      #                 jvm.cpu.time  (counter, s)  → jvm_cpu_time_seconds_total
      #                 jvm.cpu.count (gauge)        → jvm_cpu_count
      #               CPU utilisation = rate(jvm_cpu_time[5m]) / jvm_cpu_count
      #    Threshold: 40% — 4 Logarithmizer threads on a 6-CPU JVM reach ~45-67%
      #               depending on GC activity (adManualGc stop-the-world pauses
      #               reduce effective CPU by pausing the Logarithmizer threads).
      #               80% is unreachable: 4 threads / 6 CPUs = 66.7% hard ceiling.
      # ======================================================================
      - uid: orca-ad-high-cpu
        title: AdServiceHighCpu
        condition: cpu_condition
        data:
          - refId: cpu_usage
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                clamp_max(
                  sum(rate(jvm_cpu_time_seconds_total{service_name="ad"}[5m]))
                  /
                  sum(jvm_cpu_count{service_name="ad"}),
                  1
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: cpu_condition
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.4]   # 40% — 4 threads / 6 CPUs ≈ 45-67% when active
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [cpu_usage]
                  reducer:
                    type: max
              datasource:
                type: __expr__
                uid: __expr__
              expression: cpu_usage
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 1m
        annotations:
          summary: High JVM CPU utilisation on ad service
          description: |
            Ad service JVM CPU utilisation is {{ $values.cpu_usage | humanizePercentage }},
            exceeding the 40% threshold for more than 1 minute.

            Most likely cause: the **adHighCpu** feature flag is active.
            When enabled, CPULoad spawns 4 Logarithmizer daemon threads that run
            continuous CPU-intensive calculations, starving the gRPC request-handling
            thread pool.

            Investigate:
            - Check flag state at http://localhost:4000 (flagd-ui)
            - Query jvm_cpu_time_seconds_total{service_name="ad"} rate in Prometheus
            - Query jvm_cpu_count{service_name="ad"} for available processor count
            - Check for correlated GetAds latency increases (CPU contention)
            - Check ad service logs (Loki) for "High CPU-Load problempattern enabled"
          runbook_url: "http://localhost:8080"
        labels:
          severity: warning
          service_name: ad
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: advertising
          system_id: otel-demo-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 5. Ad Service — JVM GC Overload
      #    Flag:      adManualGc
      #    Mechanism: GarbageCollectionTrigger.doExecute() called on every GetAds:
      #               1. Creates Entry objects (each with a 500ms finalizer) until
      #                  heap usage reaches 90% or 500k pending finalizations.
      #               2. Calls System.gc() 10× back-to-back (stop-the-world).
      #               3. Rate-limited to at most once every 10 s.
      #    Impact:    Full GC pauses block ALL JVM threads, causing severe latency
      #               spikes on concurrent requests.
      #    Metric:    OTel Java SDK: jvm.gc.duration (histogram, s)
      #                 → jvm_gc_duration_seconds_{bucket,sum,count}
      #    JVM uses SerialGC (container memory limit ≤ 300 MB):
      #      jvm_gc_name="Copy"            action="end of minor GC"   (frequent, <100ms)
      #      jvm_gc_name="MarkSweepCompact" action="end of major GC"  (rare normally; every
      #                                                                 10 s when flag is on)
      #
      #    Query notes:
      #    - Filter jvm_gc_action="end of major GC" to isolate stop-the-world pauses.
      #      Without this filter, the ~25 short minor GC (Copy) events dominate and
      #      dilute the P99, making it appear < 100 ms even when major GC is happening.
      #    - rate([2m]) instead of [5m]: adManualGc fires once per 10 s while getAds()
      #      is called. A 5-minute window means brief test runs age out before the next
      #      eval cycle. 2 minutes captures ~12 major GC triggers while the flag is on.
      #    - noDataState: Alerting catches the case where the ad service stops exporting
      #      JVM metrics entirely (OTel Java agent failure → no GC series at all).
      #      NOTE: when no major GC occurs, histogram_quantile returns NaN (not "no
      #      data"), so noDataState: Alerting does NOT fire spuriously; NaN > 0.1 = false.
      # ======================================================================
      - uid: orca-ad-jvm-gc-overload
        title: AdServiceJvmGcHighPause
        condition: gc_condition
        data:
          - refId: gc_p99
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                histogram_quantile(0.99,
                  sum(rate(jvm_gc_duration_seconds_bucket{
                    service_name="ad",
                    jvm_gc_action="end of major GC"
                  }[2m])) by (le)
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: gc_condition
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.1]   # 100ms — major GC pauses are typically 200ms–2s
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [gc_p99]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: gc_p99
              type: threshold
        noDataState: Alerting
        execErrState: Error
        for: 1m
        annotations:
          summary: JVM GC pause spike on ad service
          description: |
            Ad service P99 GC pause is {{ $values.gc_p99 }}s,
            exceeding the 100ms threshold for more than 1 minute.

            Most likely cause: the **adManualGc** feature flag is active.
            When enabled, GarbageCollectionTrigger fills the JVM heap with objects
            having 500ms finalizers, then triggers 10 consecutive full stop-the-world
            GC cycles (once every 10 s).  This blocks all JVM threads and causes
            severe latency spikes on concurrent GetAds requests.

            Investigate:
            - Check flag state at http://localhost:4000 (flagd-ui)
            - Query jvm_gc_duration_seconds_{bucket,sum,count}{service_name="ad"}
            - Look for correlated P95 latency spikes on ad service traces
            - Check ad service logs (Loki) for "Triggering a manual garbage collection"
              and "The artificially triggered GCs took: Xms"
          runbook_url: "http://localhost:8080"
        labels:
          severity: warning
          service_name: ad
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: advertising
          system_id: otel-demo-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 6. Cross-Service — High P95 Latency
      #    Catches latency regressions across all three fault-injection targets.
      #    Uses the spanmetrics duration histogram (milliseconds) — same pipeline
      #    as the error-rate alerts, works for both gRPC and HTTP services.
      #    Filters to SPAN_KIND_SERVER to measure service-side latency only.
      #
      #    Notable triggers:
      #      adManualGc  — GC stop-the-world pauses propagate to GetAds latency
      #      adHighCpu   — CPU starvation slows gRPC request threads
      #      cartFailure — Valkey connection timeout on EmptyCart operation
      #
      #    Fix: the OTel collector spanmetrics connector emits
      #    traces_span_metrics_duration_milliseconds (with underscore between
      #    "span" and "metrics"), NOT traces_spanmetrics_duration_milliseconds.
      #    Verified against live Prometheus — the correct name returns data.
      #    noDataState changed to OK to avoid spurious firing on cold start.
      #
      #    The query uses max(histogram_quantile(...) by (service_name, le)) to
      #    produce a single scalar (max P95 across all services).  A per-service
      #    query without max() returns multiple frames — one per service_name —
      #    and Grafana's classic-conditions threshold expression strips all labels
      #    from each frame (output: {}), creating duplicate label sets and an
      #    "invalid format: frame cannot uniquely be identified by labels {}" error.
      # ======================================================================
      - uid: orca-high-latency
        title: ServiceHighLatency
        condition: latency_condition
        data:
          - refId: latency_p95
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: >-
                max(histogram_quantile(0.95,
                  sum(rate(traces_span_metrics_duration_milliseconds_bucket{span_kind="SPAN_KIND_SERVER"}[5m]))
                  by (service_name, le)
                ))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: latency_condition
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [500]   # 500ms P95 threshold
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [latency_p95]
                  reducer:
                    type: max
              datasource:
                type: __expr__
                uid: __expr__
              expression: latency_p95
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: High P95 latency detected across services
          description: |
            Max P95 latency across all services is {{ $values.latency_p95 }}ms,
            exceeding the 500ms threshold for more than 2 minutes.
            Check Grafana dashboards to identify which service is affected.

            Possible causes by service:
              ad:              adManualGc (full GC stop-the-world pauses)
                               adHighCpu  (CPU starvation of gRPC request threads)
              cart:            cartFailure (Valkey connection timeout on EmptyCart)
              product-catalog: productCatalogFailure (slow Internal error path for OLJCESPC7Z)

            Investigate:
            - Check all flag states at http://localhost:4000 (flagd-ui)
            - Query traces_span_metrics_duration_milliseconds by service_name and span_name
            - For ad: check jvm_gc_duration_seconds and jvm_cpu_time_seconds_total
            - For cart: check app_cart_add_item_latency_seconds histogram
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          # service_name is intentionally omitted here — it is carried by the
          # Prometheus query result labels (histogram_quantile groups by service_name)
          # and will be present on each per-service alert instance automatically.
          # Using "{{ $labels.service_name }}" in a static label caused Grafana to
          # pass the raw template string through to the webhook when the alert fired
          # in execErrState (no query result → $labels is empty → literal template text).
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: observability
          system_id: otel-demo-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 7. Cart Service — Not Receiving Traffic (service-down detection)
      #
      #    Replaces original: up{job="cartservice"}
      #      The `up` metric is produced ONLY by Prometheus scraping a target.
      #      Demo services push via OTLP — no scrape config exists → `up` is
      #      never written to Prometheus for these services.
      #
      #    Strategy: absent() on cart's HTTP request duration counter.
      #    The load-generator sends continuous traffic (5 virtual users) so
      #    http_server_request_duration_seconds_count{service_name="cart"} is
      #    always present while the service is healthy.  When the series
      #    disappears entirely the container has stopped or disconnected from
      #    the OTel collector.
      #
      #    absent() semantics:
      #      cart UP:   absent() → {} (empty) → noDataState: OK → no alert
      #      cart DOWN: absent() → {1}        → threshold > 0   → ALERT
      #
      #    noDataState MUST be OK here: when the cart IS running, absent()
      #    returns an empty result (the metric exists), so Grafana sees no data
      #    from the condition expression.  Setting noDataState: Alerting would
      #    cause the alert to fire continuously even when the service is healthy.
      #    execErrState: Alerting remains so query execution failures still alert.
      #
      #    NOT triggered by cartFailure (service is alive; EmptyCart just fails).
      # ======================================================================
      - uid: orca-cart-no-traffic
        title: CartServiceNotReceivingTraffic
        condition: absent_condition
        data:
          - refId: cart_metrics
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: |
                absent(http_server_request_duration_seconds_count{service_name="cart"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: absent_condition
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [cart_metrics]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: cart_metrics
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: Cart service is not receiving traffic
          description: |
            No HTTP metrics have been received from the cart service for more than
            5 minutes.  With the load-generator running 5 virtual users, this
            strongly indicates the cart container has stopped or lost its connection
            to the OTel collector → Prometheus pipeline.

            This alert is NOT triggered by the cartFailure feature flag — that flag
            only corrupts the EmptyCart code path; the service continues to emit
            HTTP metrics even when cartFailure is active.

            Investigate:
            - docker ps / docker logs cart  — is the container running?
            - Check otel-collector logs for export failures to Prometheus
            - Verify http_server_request_duration_seconds_count{service_name="cart"}
              in Prometheus Explorer — if the series is absent, the cart is down
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          service_name: cart
          deployment_environment_name: production
          domain: commerce
          legal_company: otel-demo
          sub_domain: cart
          system_id: otel-demo-001
          team: cart-team
          version: "1.0.0"

