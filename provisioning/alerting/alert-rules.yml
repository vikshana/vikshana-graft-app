apiVersion: 1

# ============================================================================
# Graft Dev Stack — Test App Alert Rules
# ============================================================================
#
# All alerts target the `test-app` service. Metrics come from the OTel Python
# auto-instrumentation (opentelemetry-instrumentation-fastapi) via the pipeline:
#
#   test-app  →  OTel Collector  →  Mimir
#
# Key metrics (OTel semconv, Prometheus label names):
#
#   http_server_request_duration_seconds_{bucket,sum,count}
#     HTTP server request duration histogram. Labels:
#       service_name              — "test-app"
#       http_request_method       — GET, POST, …
#       http_response_status_code — 200, 500, …
#       http_route                — /api/orders, /api/products, …
#
#   traces_span_metrics_duration_milliseconds_{bucket,sum,count}
#     Duration histogram generated by the OTel Collector spanmetrics connector.
#     Unit: milliseconds. Used for latency alerting.
#
# Chaos modes → alerts:
#   error     → TestAppHighErrorRate     (HTTP 500s on ~60% of requests)
#   latency   → TestAppHighLatency       (random 1–5s delay per request)
#   exception → TestAppHighErrorRate     (unhandled RuntimeError → HTTP 500)
# ============================================================================

groups:
  - orgId: 1
    name: Test App — Service Health
    folder: Orca Dev
    interval: 1m
    rules:

      # ======================================================================
      # 1. Test App — High HTTP Error Rate
      #
      #    Fires when: chaos mode "error" or "exception" is active.
      #    Mechanism:  app/chaos.py raises HTTPException(500) on 60% of requests
      #                (error mode) or RuntimeError on 100% (exception mode).
      #                OTel auto-instrumentation records http_response_status_code=500.
      #
      #    Query: HTTP 5xx rate / total request rate > 10% for 2 minutes.
      #    noDataState: OK — no data means the service is idle or not started yet.
      # ======================================================================
      - uid: test-app-high-error-rate
        title: TestAppHighErrorRate
        condition: error_rate_condition
        data:
          - refId: error_rate
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              expr: |
                (
                  sum(rate(http_server_request_duration_seconds_count{
                    service_name="test-app",
                    http_response_status_code=~"5.."
                  }[5m])) or vector(0)
                )
                /
                sum(rate(http_server_request_duration_seconds_count{
                  service_name="test-app"
                }[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: error_rate_condition
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0.10]   # 10% threshold — error mode causes ~60%
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [error_rate]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: error_rate
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: High HTTP error rate on test-app
          description: |
            test-app HTTP 5xx error rate is {{ $values.error_rate | humanizePercentage }},
            exceeding the 10% threshold for more than 2 minutes.

            Most likely cause: chaos engineering is active on the test-app.
              - "error" mode: 60% of requests return HTTP 500 (HTTPException)
              - "exception" mode: all requests raise RuntimeError → HTTP 500

            Investigate:
            - Check chaos status: GET http://localhost:8080/api/chaos/status
            - Disable chaos: POST http://localhost:8080/api/chaos/disable
            - Inspect traces in Tempo for spans with http_response_status_code=500
            - Check Loki logs: {service_name="test-app"} | json | level="error"
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          service_name: test-app
          deployment_environment_name: development
          domain: platform
          legal_company: vikshana
          sub_domain: api
          system_id: test-app-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 2. Test App — High P95 Latency
      #
      #    Fires when: chaos mode "latency" is active.
      #    Mechanism:  app/chaos.py injects asyncio.sleep(1–5s) before the handler
      #                returns. OTel auto-instrumentation measures total request
      #                duration including the injected delay.
      #
      #    Query: P95 latency from spanmetrics duration histogram > 1000ms for 2m.
      #    noDataState: OK — no traffic → no alert.
      # ======================================================================
      - uid: test-app-high-latency
        title: TestAppHighLatency
        condition: latency_condition
        data:
          - refId: latency_p95
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: mimir
            model:
              expr: |
                max(histogram_quantile(0.95,
                  sum(rate(traces_span_metrics_duration_milliseconds_bucket{
                    service_name="test-app",
                    span_kind="SPAN_KIND_SERVER"
                  }[5m]))
                  by (service_name, le)
                ))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: latency_condition
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [1000]   # 1000ms — latency mode injects 1–5s delays
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [latency_p95]
                  reducer:
                    type: max
              datasource:
                type: __expr__
                uid: __expr__
              expression: latency_p95
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: High P95 latency on test-app
          description: |
            test-app P95 request latency is {{ $values.latency_p95 }}ms,
            exceeding the 1000ms threshold for more than 2 minutes.

            Most likely cause: chaos "latency" mode is active, injecting
            random 1–5 second delays into every API request.

            Investigate:
            - Check chaos status: GET http://localhost:8080/api/chaos/status
            - Disable chaos: POST http://localhost:8080/api/chaos/disable
            - Inspect slow traces in Tempo for test-app service
            - Check Loki logs for "chaos.latency" entries with delay_seconds
          runbook_url: "http://localhost:8080"
        labels:
          severity: warning
          service_name: test-app
          deployment_environment_name: development
          domain: platform
          legal_company: vikshana
          sub_domain: api
          system_id: test-app-001
          team: platform
          version: "1.0.0"

      # ======================================================================
      # 3. Test App — Not Receiving Traffic (service-down detection)
      #
      #    Fires when: test-app container has stopped or lost its OTel connection.
      #    Uses absent() on the HTTP counter as a heartbeat.
      #
      #    noDataState MUST be OK: when test-app is healthy, absent() returns
      #    an empty result (the metric exists), which Grafana sees as "no data".
      #    Setting noDataState: Alerting would cause spurious firing.
      # ======================================================================
      - uid: test-app-no-traffic
        title: TestAppDown
        condition: absent_condition
        data:
          - refId: app_metrics
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: mimir
            model:
              expr: |
                absent(http_server_request_duration_seconds_count{service_name="test-app"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: absent_condition
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [app_metrics]
                  reducer:
                    type: last
              datasource:
                type: __expr__
                uid: __expr__
              expression: app_metrics
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: test-app is not receiving traffic
          description: |
            No HTTP metrics from test-app for more than 5 minutes.
            The container may have stopped or lost connection to the OTel Collector.

            Investigate:
            - docker ps — is test-app running?
            - docker logs test-app — any startup errors?
            - docker logs otel-collector — export failures to Mimir?
            - Verify the metric exists: http_server_request_duration_seconds_count{service_name="test-app"}
          runbook_url: "http://localhost:8080"
        labels:
          severity: critical
          service_name: test-app
          deployment_environment_name: development
          domain: platform
          legal_company: vikshana
          sub_domain: api
          system_id: test-app-001
          team: platform
          version: "1.0.0"
