apiVersion: 1

# Orca webhook — receives all Grafana alerts and triggers RCA investigations.
# The test-app alert rules are pre-configured to route here automatically.
contactPoints:
  - orgId: 1
    name: orca-webhook
    receivers:
      - uid: orca-webhook-receiver
        type: webhook
        settings:
          url: http://orca-backend:8000/webhook/grafana
          httpMethod: POST
        disableResolveMessage: false

# Route all alerts through the Orca webhook.
policies:
  - orgId: 1
    receiver: orca-webhook
    group_by: ["alertname", "service_name"]
    group_wait: 10s
    group_interval: 30s
    repeat_interval: 5m
